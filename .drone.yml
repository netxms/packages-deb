      - mv BUILD-jammy/*.deb DEBS/jammy/
      - rm -rf BUILD-jammy
    depends_on:
      - make-dist
  - name: build-noble
    image: ghcr.io/netxms/builder-deb:noble
    volumes:
      - name: m2-repo-noble
        path: /m2-repo
