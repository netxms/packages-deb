      - cp -a ../../changelog ../../compat ../../copyright ../../docs ../../Makefile ../../control.m4 ../../rules.m4 ../../*.install ../../*.postinst ../../*.postrm ../../*.service ../../*.dirs ../../*.manpages debian/
      - cp -a ../../config ../../source ../../patches debian/
      - cd debian && make DIST=focal && cd ..
      - mk-build-deps -i -t 'apt-get -y --no-install-recommends'
      - rm -f *-build-deps_*.deb *-build-deps_*.buildinfo *-build-deps_*.changes
      - dpkg-buildpackage --no-sign
      - cd ../..
      - mkdir -p DEBS/focal
      - mv BUILD-focal/*.deb DEBS/focal/
      - rm -rf BUILD-focal
    depends_on:
      - make-dist
  - name: build-jammy
    image: ghcr.io/netxms/builder-deb:jammy
    volumes:
      - name: m2-repo-jammy
        path: /m2-repo
    commands:
      - V=$(head -1 changelog | cut -d'(' -f2 | cut -d'-' -f1)
      - mkdir -p BUILD-jammy
      - tar xzf netxms_$V.orig.tar.gz -C BUILD-jammy
      - cp -a netxms_$V.orig.tar.gz BUILD-jammy/
      - cd BUILD-jammy/netxms-$V
      - mkdir -p debian
      - cp -a ../../changelog ../../compat ../../copyright ../../docs ../../Makefile ../../control.m4 ../../rules.m4 ../../*.install ../../*.postinst ../../*.postrm ../../*.service ../../*.dirs ../../*.manpages debian/
