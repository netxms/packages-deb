      - rm -rf BUILD-noble
    depends_on:
      - make-dist
  - name: upload
    image: ghcr.io/alkk/drone-rsync:latest
    settings:
      host:
        from_secret: deploy_target
      host_fingerprint:
        from_secret: deploy_host_fingerprint
      port:
        from_secret: deploy_port
      user:
        from_secret: deploy_user
      key:
        from_secret: deploy_key
      source: DEBS/
      destination: /staging/deb
      delete: true
      extra: --verbose --chmod=Dg+w,Fg+w
    depends_on:
      - build-bullseye
      - build-bookworm
      - build-trixie
      - build-focal
      - build-jammy
      - build-noble

