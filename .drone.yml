      - mv BUILD-trixie/*.deb DEBS/trixie/
      - rm -rf BUILD-trixie
    depends_on:
      - make-dist
  - name: build-focal
    image: ghcr.io/netxms/builder-deb:focal
    volumes:
      - name: m2-repo-focal
        path: /m2-repo
    commands:
      - V=$(head -1 changelog | cut -d'(' -f2 | cut -d'-' -f1)
