---
kind: pipeline
type: docker
name: build-amd64

platform:
  arch: amd64

volumes:
  - name: m2-repo-bullseye
    host:
      path: /cache/m2-repo/bullseye
  - name: m2-repo-bookworm
    host:
      path: /cache/m2-repo/bookworm
  - name: m2-repo-trixie
    host:
      path: /cache/m2-repo/trixie
  - name: m2-repo-focal
    host:
      path: /cache/m2-repo/focal
  - name: m2-repo-jammy
    host:
      path: /cache/m2-repo/jammy
  - name: m2-repo-noble
    host:
      path: /cache/m2-repo/noble

steps:
  - name: make-dist
    image: ghcr.io/alkk/netxms-make-dist:latest
    commands:
      - V=$(head -1 changelog | cut -d'(' -f2 | cut -d'-' -f1)
      - "[ -z $V ] && echo Cannot detect version, check changelog && exit 1"
      - /build.sh release-$V
      - mv netxms/netxms-$V.tar.gz netxms_$V.orig.tar.gz
      - rm -rf netxms
  - name: build-bullseye
    image: ghcr.io/netxms/builder-deb:bullseye
    volumes:
      - name: m2-repo-bullseye
        path: /m2-repo
    commands:
      - V=$(head -1 changelog | cut -d'(' -f2 | cut -d'-' -f1)
      - mkdir -p BUILD-bullseye
      - tar xzf netxms_$V.orig.tar.gz -C BUILD-bullseye
      - cp -a netxms_$V.orig.tar.gz BUILD-bullseye/
      - cd BUILD-bullseye/netxms-$V
      - mkdir -p debian
      - cp -a ../../changelog ../../compat ../../copyright ../../docs ../../Makefile ../../control.m4 ../../rules.m4 ../../*.install ../../*.postinst ../../*.postrm ../../*.service ../../*.dirs ../../*.manpages debian/
      - cp -a ../../config ../../source ../../patches debian/
      - cd debian && make DIST=bullseye && cd ..
      - mk-build-deps -i -t 'apt-get -y --no-install-recommends'
      - rm -f *-build-deps_*.deb *-build-deps_*.buildinfo *-build-deps_*.changes
      - dpkg-buildpackage --no-sign
      - cd ../..
      - mkdir -p DEBS/bullseye
      - mv BUILD-bullseye/*.deb DEBS/bullseye/
      - rm -rf BUILD-bullseye
    depends_on:
      - make-dist
  - name: build-bookworm
    image: ghcr.io/netxms/builder-deb:bookworm
    volumes:
      - name: m2-repo-bookworm
        path: /m2-repo
    commands:
      - V=$(head -1 changelog | cut -d'(' -f2 | cut -d'-' -f1)
      - mkdir -p BUILD-bookworm
      - tar xzf netxms_$V.orig.tar.gz -C BUILD-bookworm
      - cp -a netxms_$V.orig.tar.gz BUILD-bookworm/
      - cd BUILD-bookworm/netxms-$V
      - mkdir -p debian
      - cp -a ../../changelog ../../compat ../../copyright ../../docs ../../Makefile ../../control.m4 ../../rules.m4 ../../*.install ../../*.postinst ../../*.postrm ../../*.service ../../*.dirs ../../*.manpages debian/
      - cp -a ../../config ../../source ../../patches debian/
      - cd debian && make DIST=bookworm && cd ..
      - mk-build-deps -i -t 'apt-get -y --no-install-recommends'
      - rm -f *-build-deps_*.deb *-build-deps_*.buildinfo *-build-deps_*.changes
      - dpkg-buildpackage --no-sign
      - cd ../..
      - mkdir -p DEBS/bookworm
      - mv BUILD-bookworm/*.deb DEBS/bookworm/
      - rm -rf BUILD-bookworm
    depends_on:
      - make-dist
  - name: build-trixie
    image: ghcr.io/netxms/builder-deb:trixie
    volumes:
      - name: m2-repo-trixie
        path: /m2-repo
    commands:
      - V=$(head -1 changelog | cut -d'(' -f2 | cut -d'-' -f1)
